<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Malo Etchegoyen : Portfolio</title>
    <link rel="stylesheet" href="css/global.css" />
    <script src="script.js" defer></script>
    <meta name="description" content="Portfolio de Malo Etchegoyen.">
     <link rel="icon" type="image/x-icon" href="./asset/avatar.png">
  </head>
  <body class="no-scroll">
    <main>
      <div id="preloader">
        <video id="animVideo" autoplay muted playsinline aria-hidden="true">
            <source src="asset/avatar.webm" type="video/webm">
        </video>
      </div>

      <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

      <input type="checkbox" id="themeToggle" class="hidden-checkbox">
      <div class="bg-layer bg-dark"></div>
      <div class="bg-layer bg-light"></div>
      <label for="themeToggle" class="toggle-button" id="theme-icon-container"></label>
      
      <span id="cursorFollower" class="cursorFollower"></span>
      <section class="hero-section"></section>
      <section class="carousel-section" id="carousel-section"></section>
      <section class="list-section"></section>
      <section class="video-section"></section>
      <footer class="footer-section"></footer>
    </main>
    <script type="module">
        import { Cards } from "./components/carrousel/script.js";
        import { GraphicData } from "./data/graphicData.js";
        Cards.render(".carousel-section", GraphicData);

        import { Hero } from "./components/hero/script.js";
        import { HeroData } from "./data/heroData.js";
        Hero.render(".hero-section", HeroData);

        import { LI } from "./components/liste/script.js";
        import { WebData } from "./data/webData.js";
        LI.render(".list-section", WebData);

        import { Video } from "./components/video/script.js";
        import { VideoData } from "./data/videoData.js";
        Video.render(".video-section", VideoData);

        import { Footer } from "./components/footer/script.js";
        import { FooterData } from "./data/footerData.js";
        Footer.render(".footer-section", FooterData);
    </script>
  </body>
</html>
